---
apiVersion: ec2.aws.upbound.io/v1beta1
kind: Instance
metadata:
  name: my-vm
spec:
  forProvider:
    ami: ami-025258b26b492aec6
    region: us-west-1
    instanceType: t2.nano
    subnetIdRef:
      name: my-vm
    tags:
      Name: my-vm
---
apiVersion: ec2.aws.upbound.io/v1beta1
kind: InstanceState
metadata:
  name: my-vm
spec:
  forProvider:
    region: us-west-1
    instanceIdRef:
      name: my-vm
    state: running
---
apiVersion: ec2.aws.upbound.io/v1beta1
kind: VPC
metadata:
  name: my-vm
spec:
  forProvider:
    region: us-west-1
    cidrBlock: 10.0.0.0/16
    enableDnsSupport: true
---
apiVersion: ec2.aws.upbound.io/v1beta1
kind: Subnet
metadata:
  name: my-vm
spec:
  forProvider:
    region: us-west-1
    availabilityZone: us-west-1b
    cidrBlock: 10.0.0.0/24
    vpcIdRef:
      name: my-vm
    mapPublicIpOnLaunch: true
